        /* تصنيفات البطولات */
        .league-section {
            background-color: #1e293b;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);

        .league-header {
            background-color: #0284c7;

            padding: 10px 15px;

            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* كارت المباراة */
        .match-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #334155;
            transition: background 0.2s;
        }

        .match-card:last-child {
            border-bottom: none;
        }

        .match-card:hover {
            background-color: #1e293b;
        }

        .team {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
        }

        .team.home {
            text-align: left;
            padding-left: 10px;
        }

        .team.away {
            text-align: right;
            padding-right: 10px;
        }

        .match-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 110px;
            background-color: #0f172a;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .match-time {
            font-size: 14px;
            font-weight: bold;
            color: #f59e0b;
        }

        .match-channel {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
            text-align: center;
        }

        /* متجاوب مع الشاشات */
        @media (min-width: 768px) {
            header h1 { font-size: 26px; }
            .ad-desktop { display: block; }
