<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="google-site-verification" content="QD-l3WxH3M4bQYHBCwvy1Qp8BORpAGbtj4obJQLHrPg" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر لمباراة منتخب مصر - بجودة عالية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* لون غامق مريح جداً للعين */
            color: #f8fafc; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-title {
            color: #38bdf8; 
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }

        .sub-title {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 20px;
            text-align: center;
        }

        .main-layout {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* مكان البانر العلوي */
        .top-banner {
            width: 100%;
            max-width: 728px;
            height: 90px;
            background-color: #1e293b;
            border: 1px dashed #38bdf8;
            border-radius: 8px;
            display: block;
            margin: 0 auto 20px auto;
            text-align: center;
            line-height: 90px;
            color: #64748b;
            font-weight: bold;
        }

        .content-area {
            width: 100%;
            text-align: center;
        }

        /* حاوي شاشة البث المباشر النظيفة */
        .video-container {
            background-color: #1e293b;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: inline-block;
            width: 100%;
            max-width: 850px;
            vertical-align: top;
            box-sizing: border-box;
        }

        /* شاشة عرض السيرفر المباشر */
        .video-player {
            width: 100%;
            height: 480px;
            border: none;
            border-radius: 8px;
            background-color: #000;
        }

        /* البنرات الجانبية */
        .side-banner {
            width: 100%;
            max-width: 160px;
            height: 600px;
            background-color: #1e293b;
            border: 1px dashed #38bdf8;
            border-radius: 8px;
            margin: 20px auto;
            text-align: center;
            line-height: 600px;
            color: #64748b;
            font-weight: bold;
        }

        @media (min-width: 1150px) {
            .main-layout {
                position: relative;
                padding: 0 180px;
                box-sizing: border-box;
            }
            .video-container {
                width: 100%;
            }
            .side-banner {
                position: absolute;
                top: 110px;
                margin: 0;
            }
            .side-left {
                left: 0;
            }
            .side-right {
                right: 0;
            }
        }
    </style>
</head>
<body>

    <h1 class="header-title">بث مباشر مباراة منتخب مصر بدون تقطيع</h1>
    <p class="sub-title">استمتع بمشاهدة المباراة بجودة عالية وسيرفر مستقر مباشرة من صفحتنا</p>

    <div class="main-layout">
        
        <!-- 1️⃣ مكان البانر الإعلاني العلوي -->
        <div class="top-banner">
            مكان إعلان بنر علوي (728x90)
        </div>

        <div class="content-area">
            
            <!-- 2️⃣ مكان البانر الجانبي الأيمن -->
            <div class="side-banner side-right">
                إعلان جانبي (160x600)
            </div>

            <!-- 📺 شاشة البث المباشر النظيفة والمباشرة جوه موقعك -->
            <div class="video-container">
                <!-- تم استخدام سيرفر بث مباشر مفتوح ومستقر لعرض الماتشات مباشرة داخل صفحتك -->
                <iframe class="video-player" src="https://allstream.tv/embed/ch1" allowfullscreen scrolling="no" allow="autoplay; encrypted-media"></iframe>
            </div>

            <!-- 3️⃣ مكان البانر الجانبي الأيسر -->
            <div class="side-banner side-left">
                إعلان جانبي (160x600)
            </div>

        </div>
    </div>

</body>
</html>
