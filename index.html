<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="google-site-verification" content="QD-l3WxH3M4bQYHBCwvy1Qp8BORpAGbtj4obJQLHrPg" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تجهيز رابط البث المباشر</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* لون غامق مريح جداً للعين */
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-title {
            color: #38bdf8;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .main-layout {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* مكان البانر العلوي */
        .top-banner {
            width: 100%;
            max-width: 728px;
            height: 90px;
            background-color: #1e293b;
            border: 1px dashed #38bdf8;
            border-radius: 8px;
            display: block;
            margin: 0 auto 25px auto;
            text-align: center;
            line-height: 90px;
            color: #64748b;
            font-weight: bold;
        }

        .content-area {
            width: 100%;
            text-align: center;
        }

        /* حاوي المحتوى الأصلي */
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: inline-block;
            width: 100%;
            max-width: 600px;
            vertical-align: top;
            box-sizing: border-box;
        }

        .timer {
            font-size: 24px;
            font-weight: bold;
            color: #ef4444;
            margin: 20px 0;
        }

        .btn {
            display: block;
            color: white;
            padding: 16px 30px;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            margin: 15px auto;
            max-width: 80%;
            transition: background 0.3s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        .btn-go {
            background-color: #2563eb;
        }
        .btn-go:hover {
            background-color: #1d4ed8;
        }

        .btn-link {
            background-color: #10b981;
            display: none; /* مخفي وهيظهر بعد العداد */
        }
        .btn-link:hover {
            background-color: #059669;
        }

        /* البنرات الجانبية */
        .side-banner {
            width: 100%;
            max-width: 160px;
            height: 600px;
            background-color: #1e293b;
            border: 1px dashed #38bdf8;
            border-radius: 8px;
            margin: 20px auto;
            text-align: center;
            line-height: 600px;
            color: #64748b;
            font-weight: bold;
        }

        @media (min-width: 1150px) {
            .main-layout {
                position: relative;
                padding: 0 180px;
                box-sizing: border-box;
            }
            .container {
                width: 100%;
            }
            .side-banner {
                position: absolute;
                top: 115px;
                margin: 0;
            }
            .side-left {
                left: 0;
            }
            .side-right {
                right: 0;
            }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        
        <!-- 1️⃣ مكان البانر الإعلاني العلوي -->
        <div class="top-banner">
            مكان إعلان بنر علوي (728x90)
        </div>

        <div class="content-area">
            
            <!-- 2️⃣ مكان البانر الجانبي الأيمن -->
            <div class="side-banner side-right">
                إعلان جانبي (160x600)
            </div>

            <!-- المحتوى الأصلي بتاعك -->
            <div class="container">
                <h1 class="header-title">جاري تجهيز رابط البث المباشر...</h1>
                
                <!-- عداد الوقت الأصلي -->
                <div class="timer" id="countdown">انتظر 15 ثانية...</div>
                
                <!-- زرار الانتقال لأسفل الصفحة -->
                <button id="go-down-btn" class="btn btn-disabled" disabled onclick="scrollToBottom()">الرجاء الانتظار...</button>
                
                <div style="height: 300px;"></div> <!-- مسافة للننزول تحت -->

                <!-- زرار الرابط النهائي اللي بيفتح موقع الاختصار بتاعك صح -->
                <a href="https://shrinkme.click/iUJDp" id="final-link" class="btn btn-link" target="_blank">اضغط هنا لمشاهدة المباراة الآن</a>
            </div>

            <!-- 3️⃣ مكان البانر الجانبي الأيسر -->
            <div class="side-banner side-left">
                إعلان جانبي (160x600)
            </div>

        </div>
    </div>

    <script>
        let timeLeft = 15;
        const countdownEl = document.getElementById('countdown');
        const goDownBtn = document.getElementById('go-down-btn');
        const finalLink = document.getElementById('final-link');

        const timer = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                countdownEl.innerText = `انتظر ${timeLeft} ثانية...`;
            } else {
                clearInterval(timer);
                countdownEl.innerText = "الرابط جاهز الآن!";
                countdownEl.style.color = "#10b981";
                
                // تشغيل الأزرار بعد انتهاء الوقت
                goDownBtn.innerText = "انتقل إلى الرابط في الأسفل";
                goDownBtn.disabled = false;
                goDownBtn.className = "btn btn-go";
                
                finalLink.style.display = "block";
            }
        }, 1000);

        function scrollToBottom() {
            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'smooth'
            });
        }
    </script>
</body>
</html>
