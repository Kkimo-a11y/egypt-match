<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="google-site-verification" content="QD-l3WxH3M4bQYHBCwvy1Qp8BORpAGbtj4obJQLHrPg" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روابط البث المباشر للمباراة - بجودة عالية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* لون غامق مريح جداً للعين */
            color: #f8fafc; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-title {
            color: #38bdf8; 
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }

        .sub-title {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 30px;
            text-align: center;
        }

        .main-layout {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* مكان البانر العلوي */
        .top-banner {
            width: 100%;
            max-width: 728px;
            height: 90px;
            background-color: #1e293b;
            border: 1px dashed #38bdf8;
            border-radius: 8px;
            display: block;
            margin: 0 auto 25px auto;
            text-align: center;
            line-height: 90px;
            color: #64748b;
            font-weight: bold;
        }

        .content-area {
            width: 100%;
            text-align: center;
        }

        /* حاوي الأزرار المستقر */
        .buttons-container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: inline-block;
            width: 100%;
            max-width: 600px;
            vertical-align: top;
            box-sizing: border-box;
        }

        .btn {
            display: block;
            color: white;
            padding: 16px 30px;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 15px;
            transition: background 0.3s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .btn:last-child {
            margin-bottom: 0;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background-color: #10b981;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        .btn-primary:hover {
            background-color: #059669;
        }

        .btn-secondary {
            background-color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        .btn-secondary:hover {
            background-color: #1d4ed8;
        }

        /* البنرات الجانبية */
        .side-banner {
            width: 100%;
            max-width: 160px;
            height: 600px;
            background-color: #1e293b;
            border: 1px dashed #38bdf8;
            border-radius: 8px;
            margin: 20px auto;
            text-align: center;
            line-height: 600px;
            color: #64748b;
            font-weight: bold;
        }

        @media (min-width: 1150px) {
            .main-layout {
                position: relative;
                padding: 0 180px;
                box-sizing: border-box;
            }
            .buttons-container {
                width: 100%;
            }
            .side-banner {
                position: absolute;
                top: 115px;
                margin: 0;
            }
            .side-left {
                left: 0;
            }
            .side-right {
                right: 0;
            }
        }
    </style>
</head>
<body>

    <h1 class="header-title">بث مباشر للمباريات بجودة عالية وبدون تقطيع</h1>
    <p class="sub-title">اختر أحد السيرفرات التالية للانتقال مباشرة إلى صفحة العرض</p>

    <div class="main-layout">
        
        <!-- 1️⃣ مكان البانر الإعلاني العلوي -->
        <div class="top-banner">
            مكان إعلان بنر علوي (728x90)
        </div>

        <div class="content-area">
            
            <!-- 2️⃣ مكان البانر الجانبي الأيمن -->
            <div class="side-banner side-right">
                إعلان جانبي (160x600)
            </div>

            <!-- 📱 منطقة الأزرار المباشرة والنظيفة وبخط واضح -->
            <div class="buttons-container">
                
                <!-- السيرفر الرئيسي متوجه للموقع اللي أنت فاتحه وشغال حالياً -->
                <a href="https://shrinkme.click/iUJDp" class="btn btn-primary" target="_blank">اضغط هنا لمشاهدة المباراة (سيرفر 1)</a>
                
                <!-- السيرفر الاحتياطي متوجه لنفس الموقع برضه للتأكيد -->
                <a href="https://shrinkme.click/iUJDp" class="btn btn-secondary" target="_blank">اضغط هنا لمشاهدة المباراة (سيرفر 2)</a>
                
            </div>

            <!-- 3️⃣ مكان البانر الجانبي الأيسر -->
            <div class="side-banner side-left">
                إعلان جانبي (160x600)
            </div>

        </div>
    </div>

</body>
</html>
