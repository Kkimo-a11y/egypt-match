<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="google-site-verification" content="QD-l3WxH3M4bQYHBCwvy1Qp8BORpAGbtj4obJQLHrPg" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تجهيز رابط البث المباشر</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121824; 
            color: #e2e8f0; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background-color: #1e293b; 
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 90%;
            z-index: 2;
        }

        h1 {
            color: #38bdf8; 
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #94a3b8; 
        }

        .timer-box {
            font-size: 18px;
            font-weight: bold;
            color: #f59e0b; 
            margin: 25px 0;
            background: #2d3748;
            padding: 12px;
            border-radius: 8px;
            display: inline-block;
            min-width: 150px;
        }

        .buttons-container {
            display: none; 
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            display: block;
            color: white;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background-color: #10b981;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        .btn-primary:hover {
            background-color: #059669;
        }

        .btn-secondary {
            background-color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        .btn-secondary:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>أهلاً بك في موقعنا</h1>
        <p>جاري تجهيز روابط البث المباشر لمباراة منتخب مصر بجودة عالية وبدون تقطيع...</p>
        
        <div id="timer-container" class="timer-box">
            انتظر <span id="countdown">3</span> ثوانٍ...
        </div>

        <div id="buttons-group" class="buttons-container">
            <a href="https://pelotaalibre.su/home.php" class="btn btn-primary">اضغط هنا للانتقال للبث المباشر (سيرفر 1)</a>
            <a href="https://pirlotv.st/" class="btn btn-secondary">اضغط هنا للانتقال للبث المباشر (سيرفر 2)</a>
        </div>
    </div>

    <script>
        let timeLeft = 3; 
        const countdownElement = document.getElementById('countdown');
        const timerContainer = document.getElementById('timer-container');
        const buttonsGroup = document.getElementById('buttons-group');

        const downloadTimer = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(downloadTimer);
                timerContainer.style.display = 'none'; 
                buttonsGroup.style.display = 'flex'; 
            } else {
                countdownElement.textContent = timeLeft;
            }
            timeLeft -= 1;
        }, 1000);
    </script>

</body>
</html>
